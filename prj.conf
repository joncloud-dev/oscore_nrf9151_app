# SPDX-License-Identifier: Apache-2.0
#
# Minimal configuration for the OSCORE cloud sample on nRF9151. Distilled from
# the Asset-Tracker-Template prj.conf: keeps only what the oscore_cloud library
# and its plain main()-loop session helper need (no zbus / SMF / storage / FOTA /
# location / diagnostics).

CONFIG_NCS_SAMPLES_DEFAULTS=y
# The diagnostics module (below) installs its own k_sys_fatal_error_handler to
# capture a crash snapshot before rebooting, so Zephyr's default reset-on-fatal
# handler must be disabled to keep a single definition of the symbol.
CONFIG_RESET_ON_FATAL_ERROR=n

# This sample drives OSCORE directly from the main thread, so main needs the
# headroom ATT gives its dedicated 14 KB cloud thread: with VLAs off, uoscore
# stages its plaintext[]/ciphertext[] buffers (OSCORE_MAX_PLAINTEXT_LEN=1536 +
# tag) plus the CoAP/telemetry frame on the caller's stack. 8 KB overflows on
# the first telemetry protect; 16 KB matches the known-good nrf9151_client.
CONFIG_MAIN_STACK_SIZE=16384
CONFIG_HEAP_MEM_POOL_SIZE=12288
CONFIG_HEAP_MEM_POOL_IGNORE_MIN=y

# ---------------------------------------------------------------------------
# TF-M full profile: PSA crypto service required by uoscore-uedhoc (opaque
# master-secret key lives in the TF-M secure domain).
# ---------------------------------------------------------------------------
CONFIG_TFM_PROFILE_TYPE_NOT_SET=y
CONFIG_PSA_CRYPTO_DRIVER_CC3XX=y
CONFIG_TFM_PSA_FRAMEWORK_HAS_MM_IOVEC=y
CONFIG_PSA_WANT_ALG_CTR_DRBG=y

# Put TF-M's secure log on UART0 and share that instance with the non-secure
# app so both TF-M and the application console/shell come out on the DK's VCOM.
# Without this, TF-M defaults to a separate secure UART (uart1) and the console
# ends up on a port you are not watching -> "no UART output".
CONFIG_TFM_SECURE_UART0=y
CONFIG_TFM_SECURE_UART_SHARE_INSTANCE=y

# ---------------------------------------------------------------------------
# Networking: modem-offloaded sockets on the nRF91 (no native IP stack).
# ---------------------------------------------------------------------------
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_NATIVE=n
CONFIG_NET_IPV4=y

CONFIG_NRF_MODEM_LIB=y
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_NETWORK_MODE_LTE_M_NBIOT_GPS=y
CONFIG_LTE_LC_PSM_MODULE=y
CONFIG_LTE_PSM_REQ=y

# Modem info: feeds the diagnostics vitals heartbeat (RSRP/SNR/temp/band, tx/rx
# airtime) and the one-shot device-info report (modem firmware, IMEI, ICCID).
CONFIG_MODEM_INFO=y
CONFIG_MODEM_INFO_ADD_NETWORK=y

# Wall-clock time (optional telemetry timestamp; the server also stamps).
CONFIG_DATE_TIME=y

# ---------------------------------------------------------------------------
# OSCORE cloud transport.
# ---------------------------------------------------------------------------
CONFIG_COAP=y
CONFIG_UOSCORE=y
CONFIG_OSCORE_USE_EDHOC=n
CONFIG_ZCBOR=y
CONFIG_ZCBOR_CANONICAL=y
CONFIG_MBEDTLS=y
CONFIG_PSA_WANT_ALG_HMAC=y
CONFIG_PSA_WANT_ALG_SHA_256=y
CONFIG_PSA_WANT_KEY_TYPE_HMAC=y
CONFIG_PSA_WANT_ALG_CCM=y
CONFIG_PSA_WANT_KEY_TYPE_AES=y
CONFIG_OSCORE_SERVER_IP="23.88.115.159"

CONFIG_COAP_MAX_RETRANSMIT=3
CONFIG_COAP_INIT_ACK_TIMEOUT_MS=5000

# ---------------------------------------------------------------------------
# oscore_cloud library: enable the client and the framework-free session helper
# (connect / backoff / send_telemetry). FOTA and A-GNSS are off in this sample.
# ---------------------------------------------------------------------------
CONFIG_OSCORE_CLOUD=y
CONFIG_OSCORE_CLOUD_SESSION=y

# ---------------------------------------------------------------------------
# Device observability (Memfault-style): reboot reasons (key 20), a health
# vitals heartbeat (key 21), minimal crash reports (key 22) and static device
# info (key 23), all folded into the ordinary telemetry uplink. The session
# helper attaches them automatically (OSCORE_CLOUD_DIAG_AUTO_ATTACH, default y);
# main.c only calls oscore_cloud_diag_init() once at boot. See OBSERVABILITY.md.
# ---------------------------------------------------------------------------
CONFIG_OSCORE_CLOUD_DIAG=y
CONFIG_OSCORE_CLOUD_DIAG_VITALS=y
CONFIG_OSCORE_CLOUD_DIAG_CRASH=y
CONFIG_OSCORE_CLOUD_DIAG_BREADCRUMBS=y
CONFIG_OSCORE_CLOUD_DIAG_BREADCRUMB_SIZE=1024
CONFIG_OSCORE_CLOUD_DIAG_BUILD_ID=y
CONFIG_OSCORE_CLOUD_DIAG_DEVICE_INFO=y
# Attach the vitals heartbeat on every telemetry send (raise to post fleet
# vitals at a lower cadence than telemetry while sharing the same packet).
CONFIG_OSCORE_CLOUD_DIAG_VITALS_INTERVAL=1

# Reset cause + planned reboot (selected by OSCORE_CLOUD_DIAG, listed for clarity).
CONFIG_HWINFO=y
CONFIG_REBOOT=y

# Vitals sources: heap/stack headroom and CPU busy percent. Modem signal quality
# and airtime vitals reuse CONFIG_MODEM_INFO / CONFIG_LTE_LINK_CONTROL above.
CONFIG_SYS_HEAP_RUNTIME_STATS=y
CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_THREAD_RUNTIME_STATS=y

# Full coredump: in-memory backend (a small __noinit RAM region that survives a
# warm reset). Unlike the flash backend it needs no devicetree overlay, so it
# keeps this DK sample simple; the minimal inline crash report (key 22) covers
# the hard-power-cycle case. Pulled on demand over Block1 on terrestrial LTE.
CONFIG_DEBUG_COREDUMP=y
CONFIG_DEBUG_COREDUMP_BACKEND_IN_MEMORY=y
CONFIG_DEBUG_COREDUMP_BACKEND_IN_MEMORY_SIZE=8192
CONFIG_DEBUG_COREDUMP_MEMORY_DUMP_MIN=y
CONFIG_DEBUG_COREDUMP_THREAD_STACK_TOP_LIMIT_FOR_CURRENT=2048

# ---------------------------------------------------------------------------
# Persistent storage: the OSCORE Sender Sequence Number (replay counter) is
# saved to NVS so the server does not reject requests as replays after reboot.
# Uses the board's default `storage_partition` on internal flash.
# ---------------------------------------------------------------------------
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# ---------------------------------------------------------------------------
# Shell: one-time bench provisioning via `oscore provision <secret> <salt>
# <sender_id> <recipient_id>` (registered by the oscore_cloud library).
# ---------------------------------------------------------------------------
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_SHELL=y
CONFIG_SHELL_STACK_SIZE=2560
CONFIG_SHELL_CMD_BUFF_SIZE=2048

# Floating point for telemetry values.
CONFIG_PICOLIBC=y
CONFIG_FPU=y

# Logging.
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=2048
CONFIG_OSCORE_CLOUD_LOG_LEVEL_DBG=y
