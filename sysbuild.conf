#
# Build MCUboot as the bootloader at flash 0x0. On the nRF9151 DK the board's
# flash layout reserves 0x0..0x10000 for the bootloader and links TF-M / the
# application AFTER it, so without MCUboot nothing valid sits at the reset
# address: the device boots into empty flash, faults, and produces no UART
# output. MCUboot boots from 0x0 and chainloads the TF-M secure image.
SB_CONFIG_BOOTLOADER_MCUBOOT=y
